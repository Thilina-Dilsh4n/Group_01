<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card-container">
        <div class="profile-card">
            <div class="image-container">
                <img src="https://via.placeholder.com/150" alt="Student Profile Image" class="profile-photo">
            </div>
            <h2 class="name"></h2>GROUP 1
            <div class="stream-container">
                <span class="label">Stream:</span>
                <span class="stream">Computer Science & Information Systems</span>
            </div>
            <div class="divider"></div>
            <p class="short_bio">
                Passionate about web development, UI/UX design, and exploring new technologies. 
                Always eager to learn and build impactful digital experiences.
            </p>
            <div class="social-links">
                <span class="tag">Student</span>
                <span class="tag">UCSC</span>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
